<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#faf3e0"/>
      <stop offset="100%" stop-color="#e7d9b2"/>
    </radialGradient>
    <linearGradient id="pencilBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#e0a906"/>
    </linearGradient>
  </defs>

  <!-- Background (square, rounded for app-icon look) -->
  <rect x="0" y="0" width="1024" height="1024" rx="210" fill="url(#bg)"/>

  <!-- ───────── Typewriter (upper-left, 45° rotated, ~1/8 of canvas) ───────── -->
  <g transform="translate(200,210) rotate(45)">
    <!-- paper sheet sticking up out of the carriage -->
    <rect x="-27" y="-100" width="54" height="46" rx="2" fill="#fbf7ec" stroke="#cdb985" stroke-width="1.5"/>
    <text x="0" y="-71" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#2b2b2b" text-anchor="middle">taipa</text>
    <!-- platen (roller) -->
    <rect x="-50" y="-58" width="100" height="15" rx="5" fill="#2b2b2b"/>
    <!-- platen knobs -->
    <circle cx="-58" cy="-50" r="9" fill="#3a3a3a"/>
    <circle cx="58" cy="-50" r="9" fill="#3a3a3a"/>
    <!-- body -->
    <rect x="-60" y="-43" width="120" height="58" rx="9" fill="#2b2b2b"/>
    <!-- front keyboard slope -->
    <rect x="-54" y="-2" width="108" height="16" rx="4" fill="#3a3a3a"/>
    <!-- keys -->
    <g fill="#5a5a5a">
      <circle cx="-44" cy="6" r="4"/><circle cx="-33" cy="6" r="4"/><circle cx="-22" cy="6" r="4"/><circle cx="-11" cy="6" r="4"/><circle cx="0" cy="6" r="4"/><circle cx="11" cy="6" r="4"/><circle cx="22" cy="6" r="4"/><circle cx="33" cy="6" r="4"/><circle cx="44" cy="6" r="4"/>
      <circle cx="-38" cy="14" r="3.2"/><circle cx="-27" cy="14" r="3.2"/><circle cx="-16" cy="14" r="3.2"/><circle cx="-5" cy="14" r="3.2"/><circle cx="6" cy="14" r="3.2"/><circle cx="17" cy="14" r="3.2"/><circle cx="28" cy="14" r="3.2"/><circle cx="39" cy="14" r="3.2"/>
    </g>
    <!-- space bar -->
    <rect x="-26" y="20" width="52" height="6" rx="3" fill="#4a4a4a"/>
    <!-- feet -->
    <rect x="-46" y="15" width="14" height="9" rx="2" fill="#1f1f1f"/>
    <rect x="32" y="15" width="14" height="9" rx="2" fill="#1f1f1f"/>
  </g>

  <!-- ───────── Motion / throw lines (all trace from the hand) ───────── -->
  <g stroke="#2b2b2b" stroke-linecap="round" fill="none">
    <!-- long faint trajectory streaks from hand toward the typewriter -->
    <path d="M764,784 L300,322" stroke-width="2.4" opacity="0.16"/>
    <path d="M764,784 L336,346" stroke-width="2.2" opacity="0.12"/>
    <path d="M764,784 L372,372" stroke-width="2" opacity="0.09"/>
    <!-- short trails from hand to each pencil's trailing end -->
    <path d="M764,784 L699,739" stroke-width="3.2" opacity="0.5"/>
    <path d="M764,784 L704,734" stroke-width="3.2" opacity="0.5"/>
    <path d="M764,784 L709,730" stroke-width="3.2" opacity="0.5"/>
    <path d="M764,784 L713,725" stroke-width="3.2" opacity="0.5"/>
    <path d="M764,784 L718,721" stroke-width="3.2" opacity="0.5"/>
  </g>

  <!-- ───────── Five pencils (tight array, just thrown, facing the typewriter) ───────── -->
  <g transform="translate(701,722) rotate(-44)">
    <!-- pencil at x = -13 -->
    <g transform="translate(-13,0)">
      <rect x="-2.25" y="8" width="4.5" height="3" rx="1" fill="#e8746b"/>
      <rect x="-2.25" y="6" width="4.5" height="2" fill="#b8b8b8"/>
      <rect x="-2.25" y="-6" width="4.5" height="12" fill="url(#pencilBody)"/>
      <polygon points="-2.25,-6 2.25,-6 0,-12.5" fill="#3a3a3a"/>
    </g>
    <!-- pencil at x = -6.5 -->
    <g transform="translate(-6.5,0)">
      <rect x="-2.25" y="8" width="4.5" height="3" rx="1" fill="#e8746b"/>
      <rect x="-2.25" y="6" width="4.5" height="2" fill="#b8b8b8"/>
      <rect x="-2.25" y="-6" width="4.5" height="12" fill="url(#pencilBody)"/>
      <polygon points="-2.25,-6 2.25,-6 0,-12.5" fill="#3a3a3a"/>
    </g>
    <!-- pencil at x = 0 -->
    <g transform="translate(0,0)">
      <rect x="-2.25" y="8" width="4.5" height="3" rx="1" fill="#e8746b"/>
      <rect x="-2.25" y="6" width="4.5" height="2" fill="#b8b8b8"/>
      <rect x="-2.25" y="-6" width="4.5" height="12" fill="url(#pencilBody)"/>
      <polygon points="-2.25,-6 2.25,-6 0,-12.5" fill="#3a3a3a"/>
    </g>
    <!-- pencil at x = 6.5 -->
    <g transform="translate(6.5,0)">
      <rect x="-2.25" y="8" width="4.5" height="3" rx="1" fill="#e8746b"/>
      <rect x="-2.25" y="6" width="4.5" height="2" fill="#b8b8b8"/>
      <rect x="-2.25" y="-6" width="4.5" height="12" fill="url(#pencilBody)"/>
      <polygon points="-2.25,-6 2.25,-6 0,-12.5" fill="#3a3a3a"/>
    </g>
    <!-- pencil at x = 13 -->
    <g transform="translate(13,0)">
      <rect x="-2.25" y="8" width="4.5" height="3" rx="1" fill="#e8746b"/>
      <rect x="-2.25" y="6" width="4.5" height="2" fill="#b8b8b8"/>
      <rect x="-2.25" y="-6" width="4.5" height="12" fill="url(#pencilBody)"/>
      <polygon points="-2.25,-6 2.25,-6 0,-12.5" fill="#3a3a3a"/>
    </g>
  </g>

  <!-- ───────── Ninja (bottom-right, back silhouette, ~1/8 of canvas) ───────── -->
  <g transform="translate(845,850)" fill="#2b2b2b">
    <!-- head -->
    <circle cx="0" cy="-50" r="19"/>
    <!-- headband -->
    <rect x="-21" y="-56" width="42" height="8" rx="1"/>
    <!-- headband tails hanging down the back -->
    <path d="M-16,-49 L-11,-49 L-21,-16 L-27,-18 Z"/>
    <path d="M16,-49 L11,-49 L21,-16 L27,-18 Z"/>
    <!-- torso + legs -->
    <path d="M-34,-30 C-40,-14 -34,10 -28,18 L-23,60 L-9,60 L-6,18 L6,18 L9,60 L23,60 L28,18 C34,10 40,-14 34,-30 L18,-31 Q0,-27 -18,-31 Z"/>
    <!-- throwing arm (reaches up-left toward the typewriter) -->
    <path d="M-34,-30 L-66,-58 L-70,-52 L-58,-46 L-30,-22 Z"/>
    <!-- splayed fingers (longer than the pencils) leading the throw -->
    <path d="M-64,-54 L-83,-71 L-86,-66 L-67,-50 Z"/>
    <path d="M-60,-50 L-75,-67 L-79,-62 L-63,-46 Z"/>
    <path d="M-56,-46 L-66,-61 L-70,-56 L-55,-42 Z"/>
    <!-- pen arm (down, away from the throw) -->
    <path d="M34,-30 L60,16 L54,22 L28,-22 Z"/>
    <!-- pen in that hand -->
    <path d="M56,12 L64,33 L60,36 L52,15 Z"/>
    <path d="M64,33 L69,41 L60,36 Z" fill="#7d7d7d"/>
  </g>
</svg>